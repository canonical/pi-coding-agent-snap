name: Build

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
    paths:
      - 'snap/snapcraft.yaml'
      - 'snap/local/**'
      - 'spread.yaml'
      - 'tests/**'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'snap/snapcraft.yaml'
      - 'snap/local/**'
      - 'spread.yaml'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      skip-spread-tests:
        type: boolean
        description: "Skip integration tests (spread) and publish directly"
        default: false
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  snapcraft-pack-amd64:
    name: snapcraft (amd64)
    uses: ./.github/workflows/snapcraft-pack.yml
    with:
      job-arch: amd64

  snapcraft-pack-arm64:
    name: snapcraft (arm64)
    uses: ./.github/workflows/snapcraft-pack.yml
    with:
      job-arch: arm64
      runs-on: ubuntu-24.04-arm

  # Smoke tests run after both architectures build successfully
  smoke-test-amd64:
    name: smoke test (amd64)
    needs: [snapcraft-pack-amd64]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Download snap artifact
        uses: actions/download-artifact@v8
        with:
          name: snap-${{ needs.snapcraft-pack-amd64.outputs.arch }}
          path: .

      - name: Install snap
        shell: bash
        run: |
          SNAP_FILE=$(ls -1 *.snap | head -1)
          echo "Installing $SNAP_FILE"
          sudo snap install --classic --dangerous "$SNAP_FILE"

      - name: Run smoke tests
        shell: bash
        run: |
          # Verify the snap is installed
          snap list | grep "pi"

          # Check help output
          snap run pi --help 2>&1 | grep -q "pi" && echo "OK: --help works"

          # Check version
          snap run pi --version 2>&1 | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+" && echo "OK: --version works"

  # Publish only on pushes/tags, never on pull requests
  snapcraft-upload:
    name: snapcraft upload
    if: ${{ !failure() && github.event_name != 'pull_request' }}
    needs: [snapcraft-pack-amd64, snapcraft-pack-arm64, smoke-test-amd64]
    uses: ./.github/workflows/snapcraft-upload.yml
    with:
      artifact-pattern: snap-*
      snapstore-channel: ${{ github.ref_type == 'tag' && 'latest/candidate' || 'latest/edge' }}
      github-environment: ${{ github.ref_type == 'tag' && 'latest/candidate' || 'latest/edge' }}
      github-deployment: true
    secrets:
      publish-credentials: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
