name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to create (for example v0.80.6)
        required: true
        type: string
      target:
        description: Branch to tag from
        required: false
        default: main
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: create release notes
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve release context
        id: context
        uses: actions/github-script@v9
        with:
          script: |
            const isDispatch = context.eventName === "workflow_dispatch";
            const version = isDispatch ? context.payload.inputs?.version : context.ref.replace("refs/tags/", "");
            const target = isDispatch ? (context.payload.inputs?.target || "main") : context.payload.repository.default_branch;

            if (!version || !/^v\d+\.\d+\.\d+(?:[-+].*)?$/.test(version)) {
              core.setFailed(`Invalid tag '${version}'. Use format v<major>.<minor>.<patch>.`);
              return;
            }

            core.setOutput("tag", version);
            core.setOutput("target", target);

      - name: Validate release tag against packaged version
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ steps.context.outputs.tag }}
          TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && steps.context.outputs.target || steps.context.outputs.tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseTag = process.env.RELEASE_TAG;
            const targetRef = process.env.TARGET_REF;

            const content = await github.rest.repos.getContent({
              owner,
              repo,
              path: "snap/snapcraft.yaml",
              ref: targetRef,
            });

            if (!("content" in content.data)) {
              core.setFailed("Could not read snap/snapcraft.yaml from target ref.");
              return;
            }

            const snapcraft = Buffer.from(content.data.content, "base64").toString("utf8");
            const upstreamSourceTagMatches = [
              ...snapcraft.matchAll(/source:\s*https:\/\/github\.com\/earendil-works\/pi[\s\S]*?source-tag:\s*(v[^\s#]+)/g),
            ].map((m) => m[1]);

            const uniquePackagedTags = [...new Set(upstreamSourceTagMatches)];
            if (uniquePackagedTags.length !== 1) {
              core.setFailed(`Expected exactly one packaged pi source-tag, found: ${uniquePackagedTags.join(", ") || "none"}.`);
              return;
            }

            const packagedTag = uniquePackagedTags[0];

            if (releaseTag !== packagedTag) {
              core.setFailed(`Release tag ${releaseTag} must exactly match packaged pi source-tag ${packagedTag} from snap/snapcraft.yaml.`);
              return;
            }

            core.info(`Validated release tag ${releaseTag} against packaged tag ${packagedTag}.`);

      - name: Create tag from target branch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ steps.context.outputs.tag }}
          TARGET_BRANCH: ${{ steps.context.outputs.target }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const targetBranch = process.env.TARGET_BRANCH;

            const branch = await github.rest.repos.getBranch({
              owner,
              repo,
              branch: targetBranch,
            });
            const sha = branch.data.commit.sha;

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha,
              });
              core.info(`Created tag ${tag} at ${targetBranch} (${sha}).`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`Tag ${tag} already exists, skipping tag creation.`);
              } else {
                throw error;
              }
            }

      - name: Build release notes and create or update release
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ steps.context.outputs.tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentTag = process.env.RELEASE_TAG;

            function parseSemver(tag) {
              const m = /^v?(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/.exec(tag);
              if (!m) return null;
              return { major: Number(m[1]), minor: Number(m[2]), patch: Number(m[3]) };
            }

            function compareSemver(a, b) {
              if (a.major !== b.major) return a.major - b.major;
              if (a.minor !== b.minor) return a.minor - b.minor;
              return a.patch - b.patch;
            }

            async function listAllTags() {
              return github.paginate(github.rest.repos.listTags, {
                owner, repo, per_page: 100,
              });
            }

            const tags = await listAllTags();
            const semverTags = tags
              .map((t) => ({ name: t.name, parsed: parseSemver(t.name) }))
              .filter((t) => t.parsed !== null)
              .sort((a, b) => compareSemver(a.parsed, b.parsed));

            const currentParsed = parseSemver(currentTag);
            const previous = currentParsed
              ? semverTags.filter((t) => t.name !== currentTag).filter((t) => compareSemver(t.parsed, currentParsed) < 0).at(-1)
              : semverTags.filter((t) => t.name !== currentTag).at(-1);
            const previousTag = previous ? previous.name : null;

            core.info(previousTag
              ? `Using previous tag ${previousTag}`
              : "No previous semver tag found.");

            const prMap = new Map();

            if (previousTag) {
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner, repo,
                basehead: `${previousTag}...${currentTag}`,
              });

              for (const commit of comparison.data.commits) {
                const pulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner, repo, commit_sha: commit.sha, per_page: 100,
                });
                for (const pr of pulls.data) {
                  if (!pr.merged_at) continue;
                  if (pr.user?.login !== "renovate[bot]") continue;
                  prMap.set(pr.number, pr);
                }
              }
            }

            const renovatePrs = [...prMap.values()].sort((a, b) =>
              new Date(a.merged_at).getTime() - new Date(b.merged_at).getTime()
            );

            const lines = [];
            lines.push("## Renovate updates");
            lines.push("");

            if (renovatePrs.length === 0) {
              lines.push("No Renovate pull requests were detected for this release range.");
            }

            for (const pr of renovatePrs) {
              lines.push(`### #${pr.number} ${pr.title}`);
              lines.push(`- PR: ${pr.html_url}`);
              lines.push("");
            }

            const body = lines.join("\n").trim();

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner, repo, tag: currentTag,
              });
              await github.rest.repos.updateRelease({
                owner, repo, release_id: existing.data.id,
                tag_name: currentTag, name: currentTag, body,
                draft: false, prerelease: false,
              });
              core.info(`Updated release for ${currentTag}.`);
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease({
                owner, repo, tag_name: currentTag, name: currentTag, body,
                draft: false, prerelease: false,
              });
              core.info(`Created release for ${currentTag}.`);
            }
