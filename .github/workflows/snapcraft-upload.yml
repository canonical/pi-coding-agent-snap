name: snapcraft upload

on:
  workflow_call:
    inputs:
      artifact-name:
        type: string
        description: "Artifact name to download and publish"
        required: false
        default: ""
      artifact-pattern:
        type: string
        description: "Artifact name pattern to download and publish"
        required: false
        default: ""
      cache-host-snaps:
        type: boolean
        description: "Whether to cache host snaps during installation"
        required: false
        default: true
      snapd-channel:
        type: string
        description: "Snap store channel for snapd snap"
        required: false
        default: latest/stable
      core26-channel:
        type: string
        description: "Snap store channel for core26 snap"
        required: false
        default: latest/stable
      snapcraft-channel:
        type: string
        description: "Snap store channel for Snapcraft snap"
        required: false
        default: latest/stable
      snapstore-channel:
        type: string
        description: "Snap store channel to publish to"
        required: true
      github-environment:
        type: string
        description: "Deployment environment (used for approval gates)"
        required: true
      github-deployment:
        type: boolean
        description: "Whether this upload should be marked as a deployment"
        required: false
        default: false
    secrets:
      publish-credentials:
        description: "GitHub secret containing Snap Store credentials"
        required: true

jobs:
  upload:
    name: upload
    runs-on: ubuntu-24.04
    environment:
      name: ${{ inputs.github-environment }}
      deployment: ${{ inputs.github-deployment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Install snapd snap
        uses: ./.github/actions/install-cached-snap
        with:
          snap-name: snapd
          channel: ${{ inputs.snapd-channel }}
          enable-cache: ${{ inputs.cache-host-snaps }}

      - name: Install core26 snap
        uses: ./.github/actions/install-cached-snap
        with:
          snap-name: core26
          channel: ${{ inputs.core26-channel }}
          enable-cache: ${{ inputs.cache-host-snaps }}

      - name: Install snapcraft snap
        uses: ./.github/actions/install-cached-snap
        with:
          snap-name: snapcraft
          channel: ${{ inputs.snapcraft-channel }}
          classic: "true"
          enable-cache: ${{ inputs.cache-host-snaps }}

      - name: Download snap artifact
        if: ${{ inputs.artifact-pattern == '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: ./snaps/

      - name: Download snap artifacts
        if: ${{ inputs.artifact-pattern != '' }}
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.artifact-pattern }}
          path: ./snaps/
          merge-multiple: false

      - name: Release to ${{ inputs.snapstore-channel }}
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.publish-credentials }}
          SNAP_CHANNEL: ${{ inputs.snapstore-channel }}
        run: |
          set -x
          shopt -s nullglob globstar

          for SNAP_FILE in ./snaps/**/*.snap; do
            [ -f "$SNAP_FILE" ] || continue
            echo "Publishing $SNAP_FILE to $SNAP_CHANNEL"
            snapcraft upload --verbosity=brief "$SNAP_FILE" --release "$SNAP_CHANNEL"
          done
