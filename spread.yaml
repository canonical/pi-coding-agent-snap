project: pi-coding-agent-snap

backends:
    garden:
        type: adhoc
        allocate: |
            if [ -n "${SPREAD_HOST_PATH-}" ]; then
                PATH="${SPREAD_HOST_PATH}"
            fi
            exec image-garden allocate --spread \
               "$SPREAD_SYSTEM"."${SPREAD_ARCH:=$(uname -m)}"
        discard: |
            if [ -n "${SPREAD_HOST_PATH-}" ]; then
                PATH="${SPREAD_HOST_PATH}"
            fi
            image-garden discard "$SPREAD_SYSTEM_ADDRESS"
        systems:
            # TODO: add arm64 / fedora-cloud-* / opensuse systems once
            # .image-garden.mk templates and runners are ready.
            - ubuntu-cloud-26.04:
                  username: ubuntu
                  password: ubuntu
            - ubuntu-cloud-24.04:
                  username: ubuntu
                  password: ubuntu
            - debian-cloud-13:
                  username: debian
                  password: debian

exclude:
    - ".git/*"

path: /root/pi-coding-agent-snap

prepare: |
    # Install the snap that was copied into the test environment.
    snap install "$(ls ./pi-coding-agent_*.snap | sort -r | head -n 1)" --dangerous --classic

debug-each: |
    echo "Kernel and architecture:"
    uname -a

    echo "OS release info:"
    cat /etc/os-release

    echo "Installed snaps:"
    snap list

suites:
    tests/smoke/:
        summary: Smoke tests for the pi-coding-agent snap
